
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse of Hope — Hospitals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script src="nav.js"></script>
<style>
.hosp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.hosp-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:var(--t);}
.hosp-card:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:rgba(220,38,38,0.2);}
.hosp-card-top{padding:24px;border-bottom:1px solid var(--border);}
.hosp-icon{width:52px;height:52px;border-radius:14px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;}
.hosp-name{font-size:16px;font-weight:800;color:var(--dark);margin-bottom:4px;}
.hosp-loc{font-size:13px;color:var(--gray);display:flex;align-items:center;gap:5px;}
.hosp-card-body{padding:16px 24px;}
.hosp-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;}
.hosp-stat:last-child{border-bottom:none;}
.hosp-stat-lbl{font-size:12px;color:var(--gray);}
.hosp-stat-val{font-size:13px;font-weight:700;color:var(--dark);}
.hosp-card-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;}
.filter-bar{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px 24px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:28px;}
.filter-bar .form-group{margin:0;min-width:160px;flex:1;}
</style>
<!-- ADD NAVIGATION - PASTE HERE -->
<script src="nav.js"></script>
<script>
window.addEventListener('load', function() {
    injectNav();
    injectStyles();
});
</script>
<script type="module" src="supabase.js"></script>
<script src="rbac.js"></script>
<!-- END NAVIGATION -->

</head>
<body>


<div class="hero" style="padding-top:128px;">
  <div class="hero-inner">
    <h1>🏥 Registered Hospitals</h1>
    <p>All verified hospitals in the Pulse of Hope network — with live blood stock and active requests.</p>
  </div>
</div>

  <div class="page-wrap" style="padding-top:40px;">

  <!-- Hospital Registration Form -->
  <div class="emergency-card" style="margin-bottom:32px;">
    <div class="emergency-header" style="background:var(--blue);">
      <i class="bi bi-hospital-fill" style="font-size:28px;"></i>
      <div>
        <div style="font-size:18px;font-weight:800;">Add New Hospital</div>
        <div style="font-size:13px;opacity:0.9;">Register a new hospital to the network</div>
      </div>
    </div>
    
    <div class="emergency-body">
      <form id="hospitalForm" data-requires-access="canCreateHospital">
        <div class="form-row">
          <div class="form-group" style="flex:2;">
            <label>Hospital Name *</label>
            <input id="h_name" type="text" placeholder="Hospital name"/>
          </div>
          <div class="form-group">
            <label>Phone *</label>
            <input id="h_phone" type="tel" placeholder="Contact number"/>
          </div>
        </div>
        
        <div class="form-group">
          <label>Address *</label>
          <input id="h_address" type="text" placeholder="Full hospital address"/>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input id="h_email" type="email" placeholder="Email address"/>
          </div>
          <div class="form-group">
            <label>Stored Units *</label>
            <input id="h_stored" type="number" placeholder="Blood units in stock" min="0"/>
          </div>
          <div class="form-group">
            <label>Needed Units *</label>
            <input id="h_needed" type="number" placeholder="Units needed" min="0"/>
          </div>
        </div>
        
        <button type="button" class="btn btn-blue btn-full btn-lg" onclick="saveHospitalWithCheck()">
          ➕ Add Hospital to Database
        </button>
      </form>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px;">
    <div class="stat-box card" style="text-align:center;">
      <div style="font-size:2rem;font-weight:800;color:var(--blue);">23</div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-top:4px;">Total Hospitals</div>
    </div>
    <div class="stat-box card" style="text-align:center;">
      <div style="font-size:2rem;font-weight:800;color:var(--green);">15</div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-top:4px;"><span class="live-dot"></span> Online Now</div>
    </div>
    <div class="stat-box card" style="text-align:center;">
      <div style="font-size:2rem;font-weight:800;color:var(--red);">27</div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);margin-top:4px;">Active Requests</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <div class="form-group"><label>Search Hospital</label><input type="text" id="hSearch" placeholder="Name or city…" oninput="filterHospitals()"/></div>
    <div class="form-group" style="min-width:130px;flex:0.5;"><label>City</label><input type="text" id="hCity" placeholder="e.g. Manipal" oninput="filterHospitals()"/></div>
    <div class="form-group" style="min-width:130px;flex:0.5;">
      <label>Status</label>
      <select id="hStatus" onchange="filterHospitals()">
        <option value="">All</option><option value="online">Online</option><option value="offline">Offline</option>
      </select>
    </div>
    <button class="btn btn-outline btn-sm" onclick="clearHospFilter()" style="align-self:flex-end;height:42px;">Clear</button>
  </div>


  <div style="font-size:13px;color:var(--gray);margin-bottom:16px;" id="hospCount">Loading hospitals from database...</div>

  <div class="hosp-grid" id="hospGrid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// Save hospital with RBAC check
function saveHospitalWithCheck() {
    // Check if user has permission to create hospital
    if (typeof RBAC !== 'undefined' && !RBAC.enforceHospitalCreationAccess()) {
        return false;
    }
    // Call the original saveHospital function from supabase.js
    if (typeof saveHospital === 'function') {
        saveHospital();
    } else {
        console.error('saveHospital function not found');
        alert('Error: Hospital registration function not available.');
    }
}
</script>
</body>
</html>
